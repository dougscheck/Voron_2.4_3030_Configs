# This file contains common pin mappings for the BIGTREETECH Octopus Max EZ.
# To use this config, the firmware should be compiled for the
# STM32H723 with a "128KiB bootloader", "25 MHz crystal",
# and one of:
# Communication interface: "USB (on PA11/PA12)",
# Communication interface: "CAN bus (on PD0/PD1)", or
# Communication interface: "USB to CAN bus bridge (USB on PA11/PA12))" and CAN bus interface: "CAN bus (on PD0/PD1)".

# See docs/Config_Reference.md for a description of parameters.

[include mainsail.cfg]

[include homing.cfg]

[include config_backup.cfg]

[force_move]
 enable_force_move: True

[mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32h723xx_370037001151313531383332-if00

[printer]
kinematics: corexy
max_velocity: 300
max_accel: 3000
max_z_velocity: 5
max_z_accel: 100

# Motor-1
[stepper_y]
step_pin: PC13
dir_pin: !PC14
enable_pin: !PE6
microsteps: 32
rotation_distance: 40
full_steps_per_rotation:200
endstop_pin: tmc2209_stepper_y:virtual_endstop
position_min:0
position_endstop: 297
position_max: 297
homing_speed: 80
homing_retract_dist: 0
homing_positive_dir: true

[tmc2209 stepper_y]
uart_pin: PG14
interpolate: true
diag_pin: ^PF0
driver_sgthrs: 110
run_current: 0.800
sense_resistor: 0.110
stealthchop_threshold: 999999

# Motor-2
[stepper_x]
step_pin: PE4
dir_pin: !PE5
enable_pin: !PE3
microsteps: 32
rotation_distance: 40
full_steps_per_rotation: 200
endstop_pin: tmc2209_stepper_x:virtual_endstop
position_min: 0
position_endstop: 303
position_max: 303
homing_speed: 80
homing_retract_dist: 0
homing_positive_dir: true

[tmc2209 stepper_x]
uart_pin: PG13
interpolate: true
diag_pin: ^PF2
driver_sgthrs: 116
run_current: 0.800
sense_resistor: 0.110
stealthchop_threshold: 999999

# Motor-3
[stepper_z]
step_pin: PE1
dir_pin: PE0
enable_pin: !PE2
microsteps: 32
rotation_distance: 40
gear_ratio: 80:16
endstop_pin: probe:z_virtual_endstop
#position_endstop: -0.5
position_max: 400
position_min: -5
homing_speed: 8
second_homing_speed: 3
homing_retract_dist: 3

[tmc2209 stepper_z]
uart_pin: PG12
interpolate: false
##diag_pin: PF4
run_current: 0.800
sense_resistor: 0.110
stealthchop_threshold: 0

# Motor-4
[stepper_z1]
step_pin: PB8
dir_pin: !PB9
enable_pin: !PB7
microsteps: 32
rotation_distance: 40
gear_ratio: 80:16

[tmc2209 stepper_z1]
uart_pin: PG11
interpolate: false
##diag_pin: PF3
run_current: 0.800
sense_resistor: 0.110
stealthchop_threshold: 0

# Motor-5
[stepper_z2]
step_pin: PB5
dir_pin: PB4
enable_pin: !PB6
microsteps: 32
rotation_distance: 40
gear_ratio: 80:16

[tmc2209 stepper_z2]
uart_pin: PG10
interpolate: false
run_current: 0.800
sense_resistor: 0.110
stealthchop_threshold: 0

# Motor-6
[stepper_z3]
step_pin: PG15
dir_pin: !PB3
enable_pin: !PD5
microsteps: 32
rotation_distance: 40
gear_ratio: 80:16

[tmc2209 stepper_z3]
uart_pin: PG9
interpolate: false
run_current: 0.800
sense_resistor: 0.110
stealthchop_threshold: 0

# Motor-7
[extruder]
step_pin: PD3
dir_pin: PD2
enable_pin: !PD4
rotation_distance: 33.500
gear_ratio: 50:10
microsteps: 32
full_steps_Per_rotation: 200
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: PF6 # HE0
sensor_pin:  PB0 # T0
sensor_type: PT1000
pullup_resistor: 2200
min_temp: 10
max_temp: 270
max_power: 1.0
min_extrude_temp: 170
control: pid
pid_Kp: 22.2
pid_Ki: 1.08
pid_Kd: 114
#pressure_advance: 0.05
#pressure_advance_smooth_time: 0.040

[tmc2209 extruder]
uart_pin: PD7
interpolate: false
run_current: 0.800
sense_resistor: 0.110
stealthchop_threshold: 0

#[filament_switch_sensor material_0]
#switch_pin: PF1

#[filament_switch_sensor material_1]
#switch_pin: PC15

[heater_bed]
heater_pin: PF5
sensor_pin: PB1 # TB
sensor_type: ATC Semitec 104GT-2
#control: watermark
min_temp: 0
max_temp: 130

## Print Cooling Fan - Fan0
[fan]
pin: PA6
kick_start_time: 0.5
off_below: 0.10

## Hot End Fan - Fan1
[heater_fan Hot_end Fan]
pin: PA5
max_power: 1.0
kick_start_time: 0.5
heater: extruder
heater_temp: 50.0

## Case Fan - FAN2
[controller_fan Case Fan]
pin: PA4
kick_start_time: 0.5
heater: heater_bed


